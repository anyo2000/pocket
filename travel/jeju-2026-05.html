<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>제주 1박2일</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #ffffff;
  --surface: #ffffff;
  --surface-2: #faf7f2;
  --text: #1a1814;
  --text-dim: #6b6660;
  --text-muted: #a09b94;
  --accent: #e85a1a;
  --accent-soft: rgba(232, 90, 26, 0.07);
  --accent-border: rgba(232, 90, 26, 0.3);
  --border: #ebe6dc;
  --border-soft: #f3eee5;
  --serif-en: 'Cormorant Garamond', serif;
  --serif-kr: 'Noto Serif KR', serif;
  --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 400;
  line-height: 1.6;
  min-height: 100vh;
  padding: 28px 20px 100px;
  max-width: 560px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.005em;
}

/* --- User Picker Overlay --- */
.user-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,0.97);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 32px;
}
.user-overlay.hidden { display: none; }
.user-overlay h2 {
  font-family: var(--serif-kr); font-weight: 500; font-size: 20px; color: var(--text);
}
.user-buttons { display: flex; gap: 20px; }
.user-btn {
  width: 80px; height: 80px; border-radius: 50%;
  border: 2px solid var(--border); background: var(--surface-2);
  font-family: var(--serif-en); font-size: 32px; font-weight: 600;
  color: var(--text); cursor: pointer; transition: all 0.2s;
}
.user-btn:hover, .user-btn:active {
  border-color: var(--accent); color: var(--accent); background: var(--accent-soft);
}

/* --- Now Pill --- */
.now-pill {
  position: fixed; top: env(safe-area-inset-top, 0); left: 50%; transform: translateX(-50%);
  background: var(--accent); color: white; font-family: var(--serif-en); font-style: italic;
  font-size: 11px; font-weight: 500; letter-spacing: 0.2em; padding: 4px 14px 5px;
  border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;
  z-index: 100; text-transform: uppercase; display: none;
  animation: pulseGlow 2.5s ease-in-out infinite;
}
.now-pill.active { display: block; }
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(232, 90, 26, 0); }
  50% { box-shadow: 0 0 24px 0 rgba(232, 90, 26, 0.4); }
}

/* --- User indicator --- */
.user-indicator {
  position: fixed; bottom: 20px; right: 20px; z-index: 100;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); color: white; font-family: var(--serif-en);
  font-size: 16px; font-weight: 600; display: flex; align-items: center;
  justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* --- Edit toggle --- */
.edit-toggle {
  position: fixed; bottom: 20px; left: 20px; z-index: 100;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface); color: var(--text-muted); border: 1px solid var(--border);
  font-size: 16px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.edit-toggle.active { background: var(--accent); color: white; border-color: var(--accent); }

.header {
  text-align: center; padding: 28px 0 36px; border-bottom: 1px solid var(--border);
  margin-bottom: 36px; animation: fadeIn 0.8s ease;
}
.kicker {
  font-family: var(--serif-en); font-style: italic; color: var(--accent);
  letter-spacing: 0.35em; font-size: 10px; text-transform: uppercase; margin-bottom: 14px;
}
.title-mark {
  display: inline-block; width: 24px; height: 1px; background: var(--accent);
  vertical-align: middle; margin: 0 10px; opacity: 0.6;
}
h1 { font-family: var(--serif-kr); font-weight: 600; font-size: 38px; letter-spacing: -0.02em; line-height: 1.1; color: var(--text); }
.date { font-family: var(--serif-en); font-size: 13px; color: var(--text-dim); letter-spacing: 0.25em; margin-top: 14px; font-weight: 400; }
.legend-top { display: flex; gap: 18px; justify-content: center; margin-top: 22px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; }
.legend-top .li { display: inline-flex; align-items: center; gap: 7px; }
.legend-top .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
.legend-top .dash { width: 14px; height: 1px; background: var(--text-muted); }

/* --- Top tabs --- */
.top-tabs {
  display: flex; gap: 0; margin-bottom: 36px;
  border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
}
.top-tab {
  flex: 1; padding: 10px 0; text-align: center;
  font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
  color: var(--text-muted); background: var(--surface-2); cursor: pointer; transition: all 0.2s;
  border-right: 1px solid var(--border);
}
.top-tab:last-child { border-right: none; }
.top-tab.active { color: var(--accent); background: var(--surface); }
.view-itinerary, .view-notes { display: none; }
.view-itinerary.active, .view-notes.active { display: block; }

.section-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 22px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.section-label { font-family: var(--serif-en); font-style: italic; color: var(--accent); font-size: 16px; letter-spacing: 0.2em; text-transform: uppercase; }
.section-title { font-family: var(--serif-kr); font-weight: 500; font-size: 17px; color: var(--text); }
.section-meta { margin-left: auto; font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; font-family: var(--sans); font-weight: 400; text-align: right; line-height: 1.35; }

.map-section { margin-bottom: 56px; animation: fadeIn 0.8s ease 0.1s backwards; }
.leaflet-map { width: 100%; height: 280px; border: 1px solid var(--border); border-radius: 4px; z-index: 1; }
.leaflet-map .leaflet-popup-content-wrapper { font-family: var(--sans); font-size: 13px; border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
.leaflet-map .leaflet-popup-content { margin: 10px 14px; }
.map-tab-bar { display: flex; gap: 0; margin-bottom: 0; }
.map-tab {
  flex: 1; padding: 10px 0; text-align: center; font-family: var(--serif-en); font-style: italic;
  font-size: 13px; letter-spacing: 0.15em; color: var(--text-muted); background: var(--surface-2);
  border: 1px solid var(--border); border-bottom: none; cursor: pointer; transition: all 0.2s;
}
.map-tab:first-child { border-radius: 4px 0 0 0; }
.map-tab:last-child { border-radius: 0 4px 0 0; }
.map-tab.active { color: var(--accent); background: var(--surface); border-bottom: 1px solid var(--surface); font-weight: 500; }
.map-tooltip { font-family: var(--sans) !important; font-size: 11px !important; font-weight: 500 !important; border: none !important; background: rgba(255,255,255,0.92) !important; box-shadow: 0 1px 4px rgba(0,0,0,0.15) !important; padding: 3px 8px !important; border-radius: 4px !important; }
.map-tooltip::before { display: none !important; }

.day-section { margin-bottom: 56px; animation: fadeIn 0.8s ease 0.3s backwards; }
.day-section.day-2 { animation-delay: 0.5s; }
.timeline { display: flex; flex-direction: column; }

.event {
  display: grid; grid-template-columns: 72px 1fr; gap: 18px; padding: 20px 0;
  border-bottom: 1px solid var(--border-soft); position: relative;
  transition: opacity 0.4s ease, background 0.4s ease;
}
.event:last-child { border-bottom: none; }
.event.fixed::before {
  content: ''; position: absolute; left: 60px; top: 31px; width: 5px; height: 5px;
  background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px rgba(232, 90, 26, 0.4);
}
.event.now {
  background: linear-gradient(90deg, var(--accent-soft) 0%, transparent 80%);
  margin: 0 -16px; padding: 20px 16px; border-left: 2px solid var(--accent);
  border-bottom: 1px solid var(--border-soft);
}
.event.now .time { color: var(--accent); }
.event.now::after {
  content: 'NOW'; position: absolute; top: 8px; right: 12px; font-family: var(--serif-en);
  font-style: italic; font-size: 10px; letter-spacing: 0.3em; color: var(--accent);
}
.event.past { opacity: 0.9; }
.event.past .time { color: var(--text-muted); }

.time { font-family: var(--serif-en); font-size: 24px; font-weight: 400; letter-spacing: 0.01em; color: var(--text); line-height: 1; padding-top: 4px; font-variant-numeric: tabular-nums; }
.content { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.activity { font-size: 16px; line-height: 1.4; font-weight: 400; color: var(--text); }
.event.fixed .activity { font-weight: 500; }
.tag { display: inline-block; font-family: var(--serif-en); font-style: italic; font-size: 10px; letter-spacing: 0.2em; color: var(--accent); margin-left: 8px; text-transform: uppercase; vertical-align: 1px; }
.tag.dim { color: var(--text-muted); }
.note { font-size: 12.5px; color: var(--text-dim); line-height: 1.55; margin-top: 2px; font-weight: 400; }
.note.warn { color: var(--accent); opacity: 0.85; }
.note.warn::before { content: '\26A0 '; font-style: normal; }

.actions { display: flex; gap: 7px; margin-top: 11px; flex-wrap: wrap; }
.action {
  display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; font-size: 11px;
  font-weight: 400; letter-spacing: 0.04em; color: var(--text-dim); border: 1px solid var(--border);
  border-radius: 100px; text-decoration: none; background: var(--surface); transition: all 0.2s; font-family: var(--sans);
}
.action:hover, .action:active { color: var(--accent); border-color: var(--accent-border); background: var(--surface-2); }

/* --- Interaction buttons --- */
.interact-bar {
  display: flex; gap: 6px; margin-top: 10px; align-items: center;
}
.score-btn {
  width: 32px; height: 28px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface); font-size: 14px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: all 0.15s; color: var(--text-dim);
}
.score-btn:active { background: var(--accent-soft); }
.score-display {
  font-family: var(--serif-en); font-size: 14px; font-weight: 500; min-width: 24px;
  text-align: center; color: var(--text);
}
.score-display.positive { color: var(--accent); }
.score-display.negative { color: #999; }
.comment-btn {
  margin-left: auto; padding: 5px 10px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface); font-size: 12px; cursor: pointer; color: var(--text-dim);
  transition: all 0.15s; display: flex; align-items: center; gap: 4px;
}
.comment-btn:active { background: var(--accent-soft); }
.comment-btn .count { font-family: var(--serif-en); font-size: 11px; color: var(--accent); }

/* --- Comment panel --- */
.comment-panel {
  display: none; margin-top: 10px; padding: 12px; background: var(--surface-2);
  border-radius: 6px; border: 1px solid var(--border-soft);
}
.comment-panel.open { display: block; }
.comment-input-row { display: flex; gap: 6px; }
.comment-input {
  flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
  font-size: 13px; font-family: var(--sans); background: var(--surface); outline: none;
}
.comment-input:focus { border-color: var(--accent-border); }
.comment-send {
  padding: 8px 14px; border: none; border-radius: 4px; background: var(--accent);
  color: white; font-size: 12px; font-weight: 500; cursor: pointer;
}
.comment-list { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.comment-item {
  font-size: 12px; color: var(--text-dim); line-height: 1.5; padding: 6px 0;
  border-bottom: 1px solid var(--border-soft);
}
.comment-item:last-child { border-bottom: none; }
.comment-item .who {
  font-family: var(--serif-en); font-weight: 600; color: var(--accent); margin-right: 6px;
}
.comment-item .when { font-size: 10px; color: var(--text-muted); margin-left: 6px; }

/* --- Day comment --- */
.day-comment-section {
  margin-top: 16px; padding: 16px; background: var(--surface-2); border-radius: 8px;
  border: 1px solid var(--border-soft);
}
.day-comment-header {
  font-family: var(--serif-en); font-style: italic; font-size: 12px; color: var(--accent);
  letter-spacing: 0.15em; margin-bottom: 10px;
}

/* --- Edit mode buttons --- */
.edit-btns {
  display: flex; gap: 6px; margin-top: 10px;
}
.edit-event-btn, .delete-event-btn {
  padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer;
  font-family: var(--sans); font-weight: 500; transition: all 0.15s;
}
.edit-event-btn {
  border: 1px solid var(--border); background: var(--surface); color: var(--text-dim);
}
.edit-event-btn:active { background: var(--accent-soft); color: var(--accent); }
.delete-event-btn {
  border: 1px solid #e5c5c5; background: var(--surface); color: #c44;
}
.delete-event-btn:active { background: #fef2f2; }
.add-event-btn {
  display: block; width: 100%; padding: 14px; margin-top: 8px;
  border: 1px dashed var(--accent-border); border-radius: 6px;
  background: var(--accent-soft); color: var(--accent);
  font-size: 13px; font-weight: 500; cursor: pointer; text-align: center;
  font-family: var(--sans);
}
.add-event-btn:active { background: rgba(232, 90, 26, 0.12); }

/* --- Edit modal --- */
.edit-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  z-index: 300; display: none; align-items: flex-end; justify-content: center;
}
.edit-modal.open { display: flex; }
.edit-modal-body {
  background: white; width: 100%; max-width: 560px;
  border-radius: 16px 16px 0 0; padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0));
}
.edit-modal-title {
  font-family: var(--serif-kr); font-weight: 500; font-size: 17px;
  margin-bottom: 20px; color: var(--text);
}
.edit-field { margin-bottom: 14px; }
.edit-field label {
  display: block; font-size: 11px; color: var(--text-muted);
  letter-spacing: 0.05em; margin-bottom: 6px; font-weight: 500;
}
.edit-field input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 15px; font-family: var(--sans); background: var(--surface); outline: none;
}
.edit-field input:focus { border-color: var(--accent-border); }
.edit-modal-actions {
  display: flex; gap: 8px; margin-top: 20px;
}
.edit-modal-actions button {
  flex: 1; padding: 12px; border-radius: 6px; font-size: 14px;
  font-weight: 500; cursor: pointer; font-family: var(--sans);
}
.btn-save {
  border: none; background: var(--accent); color: white;
}
.btn-delete {
  border: 1px solid #e5c5c5; background: white; color: #c44;
}
.btn-cancel {
  border: 1px solid var(--border); background: white; color: var(--text-dim);
}

/* --- Notes view --- */
.notes-section { margin-bottom: 40px; }
.notes-section h3 { font-family: var(--serif-kr); font-size: 15px; font-weight: 500; margin-bottom: 12px; color: var(--text); }
.note-card {
  padding: 12px; margin-bottom: 8px; background: var(--surface-2); border-radius: 6px;
  border-left: 3px solid var(--accent);
}
.note-card .nc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.note-card .nc-place { font-size: 13px; font-weight: 500; color: var(--text); }
.note-card .nc-score { font-family: var(--serif-en); font-size: 14px; font-weight: 600; }
.note-card .nc-score.positive { color: var(--accent); }
.note-card .nc-score.negative { color: #999; }
.note-card .nc-comments { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
.note-card .nc-comments span { display: block; margin-top: 2px; }
.notes-empty { font-size: 13px; color: var(--text-muted); font-style: italic; text-align: center; padding: 40px 0; }
.export-btn {
  display: block; width: 100%; padding: 12px; border: 1px solid var(--accent); border-radius: 6px;
  background: var(--surface); color: var(--accent); font-size: 13px; font-weight: 500;
  text-align: center; cursor: pointer; margin-top: 20px;
}
.export-btn:active { background: var(--accent-soft); }

.footer {
  margin-top: 64px; padding-top: 28px; border-top: 1px solid var(--border);
  text-align: center; font-family: var(--serif-en); font-style: italic; font-size: 12px;
  color: var(--text-muted); letter-spacing: 0.15em;
}
.footer .clock { font-style: normal; color: var(--text-dim); font-size: 13px; letter-spacing: 0.1em; margin-bottom: 6px; display: block; font-variant-numeric: tabular-nums; font-family: var(--sans); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@media (min-width: 600px) {
  body { padding: 48px 36px 100px; }
  h1 { font-size: 48px; }
  .event { grid-template-columns: 84px 1fr; gap: 24px; }
  .event.fixed::before { left: 70px; }
  .time { font-size: 28px; }
  .activity { font-size: 17px; }
}
</style>
</head>
<body>

<!-- User Picker -->
<div class="user-overlay" id="userOverlay">
  <h2>누구세요?</h2>
  <div class="user-buttons">
    <button class="user-btn" onclick="selectUser('H')">H</button>
    <button class="user-btn" onclick="selectUser('A')">A</button>
  </div>
</div>

<!-- User indicator -->
<div class="user-indicator" id="userBadge" style="display:none" onclick="switchUser()"></div>

<!-- Edit toggle -->
<div class="edit-toggle" id="editToggle" onclick="toggleEditMode()">✎</div>

<div class="now-pill" id="nowPill">Now</div>

<header class="header">
  <div class="kicker">Jeju<span class="title-mark"></span>Itinerary</div>
  <h1>제주 1박2일</h1>
  <div class="date">2026 · MAY 5 — 6</div>
  <div class="legend-top">
    <span class="li"><span class="dot"></span>확정</span>
    <span class="li"><span class="dash"></span>유연</span>
  </div>
</header>

<!-- Top tabs -->
<div class="top-tabs">
  <div class="top-tab active" onclick="switchView('itinerary')">일정</div>
  <div class="top-tab" onclick="switchView('notes')">모아보기</div>
</div>

<!-- ========== ITINERARY VIEW ========== -->
<div class="view-itinerary active" id="viewItinerary">

<section class="map-section">
  <div class="section-header">
    <span class="section-label">Geography</span>
    <span class="section-title">동선</span>
    <span class="section-meta">두 날 분리</span>
  </div>
  <div class="map-tab-bar">
    <div class="map-tab active" onclick="showDay(1)">Day 01 · 콤팩트</div>
    <div class="map-tab" onclick="showDay(2)">Day 02 · 확장</div>
  </div>
  <div id="map" class="leaflet-map"></div>
</section>

<section class="day-section day-1">
  <div class="section-header">
    <span class="section-label">Day 01</span>
    <span class="section-title">탑동 디자인 코스</span>
    <span class="section-meta">5/5 화<br>어린이날</span>
  </div>
  <div class="timeline" id="timeline-day1"></div>
  <div class="day-comment-section" data-day="day1">
    <div class="day-comment-header">Day 01 — 오늘 한마디</div>
    <div class="comment-input-row">
      <input class="comment-input" placeholder="오늘 하루 어땠어?" maxlength="200">
      <button class="comment-send" onclick="sendDayComment('day1', this)">보내기</button>
    </div>
    <div class="comment-list" data-day-comments="day1"></div>
  </div>
</section>

<section class="day-section day-2">
  <div class="section-header">
    <span class="section-label">Day 02</span>
    <span class="section-title">러닝 + 강의 + 미식 마무리</span>
    <span class="section-meta">5/6 수<br>평일</span>
  </div>
  <div class="timeline" id="timeline-day2"></div>
  <div class="day-comment-section" data-day="day2">
    <div class="day-comment-header">Day 02 — 오늘 한마디</div>
    <div class="comment-input-row">
      <input class="comment-input" placeholder="오늘 하루 어땠어?" maxlength="200">
      <button class="comment-send" onclick="sendDayComment('day2', this)">보내기</button>
    </div>
    <div class="comment-list" data-day-comments="day2"></div>
  </div>
</section>

</div><!-- /viewItinerary -->

<!-- ========== NOTES VIEW ========== -->

  <div class="section-header">

// --- State ---
var eventsData = DEFAULT_EVENTS.slice();
var editMode = false;
var editingId = null;
var editingDay = 1;
var allScores = {}, allComments = {}, allDayComments = {};

// --- Render ---
function renderAllEvents() {
  renderDayTimeline(1);
  renderDayTimeline(2);
  injectInteractBars();
  applyScoresUI();
  applyCommentsUI();
  applyDayCommentsUI();
  updateTimeline();
}

function renderDayTimeline(day) {
  var timeline = document.getElementById('timeline-day' + day);
  var dayEvents = eventsData.filter(function(e) { return e.day === day; });
  dayEvents.sort(function(a, b) { return a.start < b.start ? -1 : a.start > b.start ? 1 : 0; });

  var html = '';
  dayEvents.forEach(function(evt) { html += buildEventHTML(evt); });
  if (editMode) {
    html += '<button class="add-event-btn" onclick="openAddModal(' + day + ')">+ 일정 추가</button>';
  }
  timeline.innerHTML = html;
}

function buildEventHTML(evt) {
  var cls = 'event' + (evt.fixed ? ' fixed' : '');
  var h = '<div class="' + cls + '" data-start="' + esc(evt.start) + '" data-id="' + esc(evt.id) + '">';
  h += '<div class="time">' + esc(evt.time) + '</div>';
  h += '<div class="content">';
  h += '<div class="activity">' + esc(evt.activity);
  if (evt.tag) h += '<span class="tag' + (evt.tagDim ? ' dim' : '') + '">' + esc(evt.tag) + '</span>';
  h += '</div>';
  if (evt.notes) evt.notes.forEach(function(n) { if (n) h += '<div class="note">' + esc(n) + '</div>'; });
  if (evt.warnNotes) evt.warnNotes.forEach(function(n) { if (n) h += '<div class="note warn">' + esc(n) + '</div>'; });
  if (evt.actions && evt.actions.length) {
    h += '<div class="actions">';
    evt.actions.forEach(function(a) {
      var isPhone = a.url && a.url.indexOf('tel:') === 0;
      h += '<a class="action" href="' + esc(a.url) + '"' + (isPhone ? '' : ' target="_blank"') + '>' + esc(a.icon || '📍') + ' ' + esc(a.label) + '</a>';
    });
    h += '</div>';
  }
  if (editMode) {
    h += '<div class="edit-btns">';
    h += '<button class="edit-event-btn" onclick="openEditModal(\'' + evt.id + '\')">수정</button>';
    h += '<button class="delete-event-btn" onclick="confirmDeleteEvent(\'' + evt.id + '\')">삭제</button>';
    h += '</div>';
  }
  h += '</div></div>';
  return h;
}

// --- Inject interact bars ---
function injectInteractBars() {
  document.querySelectorAll('.event[data-id]').forEach(function(evt) {
    var id = evt.dataset.id;
    var content = evt.querySelector('.content');
    if (content.querySelector('.interact-bar')) return;

    var bar = document.createElement('div');
    bar.className = 'interact-bar';
    bar.innerHTML =
      '<button class="score-btn" onclick="vote(\'' + id + '\',-1)">-</button>' +
      '<span class="score-display" data-score-display="' + id + '">0</span>' +
      '<button class="score-btn" onclick="vote(\'' + id + '\',1)">+</button>' +
      '<button class="comment-btn" onclick="toggleComment(\'' + id + '\')">' +
      '\uD83D\uDCAC <span class="count" data-comment-count="' + id + '"></span></button>';
    content.appendChild(bar);

    var panel = document.createElement('div');
    panel.className = 'comment-panel';
    panel.setAttribute('data-panel', id);
    panel.innerHTML =
      '<div class="comment-input-row">' +
      '<input class="comment-input" placeholder="메모, 비용, 감상 아무거나" maxlength="200" onkeydown="if(event.key===\'Enter\')sendComment(\'' + id + '\',this)">' +
      '<button class="comment-send" onclick="sendComment(\'' + id + '\',this.previousElementSibling)">보내기</button>' +
      '</div>' +
      '<div class="comment-list" data-comments="' + id + '"></div>';
    content.appendChild(panel);
  });
}

// --- Initial render ---
renderAllEvents();

// --- Firebase Events Sync ---
var seeding = false;
tripRef.collection('events').onSnapshot(function(snap) {
  if (snap.empty && !seeding) {
    seeding = true;
    var batch = db.batch();
    DEFAULT_EVENTS.forEach(function(evt) {
      batch.set(tripRef.collection('events').doc(evt.id), evt);
    });
    batch.commit();
    return;
  }
  if (!snap.empty) {
    eventsData = [];
    snap.forEach(function(doc) { eventsData.push(doc.data()); });
    renderAllEvents();
  }
});

// --- Edit Mode ---
function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('editToggle').classList.toggle('active', editMode);
  renderAllEvents();
}

// --- Edit Modal ---
function openAddModal(day) {
  editingId = null;
  editingDay = day;
  document.getElementById('editModalTitle').textContent = '일정 추가';
  document.getElementById('editTime').value = '';
  document.getElementById('editActivity').value = '';
  document.getElementById('editDeleteBtn').style.display = 'none';
  document.getElementById('editModal').classList.add('open');
}

function openEditModal(id) {
  var evt = eventsData.find(function(e) { return e.id === id; });
  if (!evt) return;
  editingId = id;
  editingDay = evt.day;
  document.getElementById('editModalTitle').textContent = '일정 수정';
  document.getElementById('editTime').value = evt.time;
  document.getElementById('editActivity').value = evt.activity;
  document.getElementById('editDeleteBtn').style.display = 'block';
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
}

function saveEvent() {
  var time = document.getElementById('editTime').value;
  var activity = document.getElementById('editActivity').value.trim();
  if (!time || !activity) { alert('시간과 활동명을 입력하세요'); return; }

  var dateStr = editingDay === 1 ? '2026-05-05' : '2026-05-06';
  var start = dateStr + 'T' + time;

  if (editingId) {
    tripRef.collection('events').doc(editingId).update({
      time: time, start: start, activity: activity
    });
  } else {
    var id = 'd' + editingDay + '-' + Date.now();
    tripRef.collection('events').doc(id).set({
      id: id, day: editingDay, time: time, start: start, activity: activity,
      fixed: false, tag: '', tagDim: false, notes: [], warnNotes: [], actions: []
    });
  }
  closeEditModal();
}

function confirmDeleteEvent(id) {
  if (id) editingId = id;
  if (!editingId) return;
  var evt = eventsData.find(function(e) { return e.id === editingId; });
  var name = evt ? evt.activity : '';
  if (confirm('"' + name + '" 삭제할까요?')) {
    tripRef.collection('events').doc(editingId).delete();
    closeEditModal();
  }
}

// --- Score ---
function vote(id, delta) {
  if (!currentUser) return;
  var update = {};
  update[currentUser] = firebase.firestore.FieldValue.increment(delta);
  tripRef.collection('scores').doc(id).set(update, { merge: true });
}

// --- Score UI ---
function applyScoresUI() {
  Object.keys(allScores).forEach(function(id) {
    var data = allScores[id];
    var total = (data.H || 0) + (data.A || 0);
    var el = document.querySelector('[data-score-display="' + id + '"]');
    if (el) {
      el.textContent = total > 0 ? '+' + total : total;
      el.className = 'score-display' + (total > 0 ? ' positive' : total < 0 ? ' negative' : '');
    }
  });
}

tripRef.collection('scores').onSnapshot(function(snap) {
  allScores = {};
  snap.forEach(function(doc) { allScores[doc.id] = doc.data(); });
  applyScoresUI();
});

// --- Comments ---
function toggleComment(id) {
  var panel = document.querySelector('[data-panel="' + id + '"]');
  if (!panel) return;
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) panel.querySelector('.comment-input').focus();
}

function sendComment(id, input) {
  var text = input.value.trim();
  if (!text || !currentUser) return;
  tripRef.collection('comments').add({
    eventId: id, user: currentUser, text: text,
    ts: firebase.firestore.FieldValue.serverTimestamp()
  });
  input.value = '';
}

function sendDayComment(day, btn) {
  var input = btn.previousElementSibling;
  var text = input.value.trim();
  if (!text || !currentUser) return;
  tripRef.collection('dayComments').add({
    day: day, user: currentUser, text: text,
    ts: firebase.firestore.FieldValue.serverTimestamp()
  });
  input.value = '';
}

function applyCommentsUI() {
  document.querySelectorAll('[data-comments]').forEach(function(el) {
    var id = el.dataset.comments;
    var items = allComments[id] || [];
    el.innerHTML = items.map(function(c) {
      var time = c.ts ? new Date(c.ts.seconds * 1000) : null;
      var timeStr = time ? (time.getMonth()+1) + '/' + time.getDate() + ' ' + String(time.getHours()).padStart(2,'0') + ':' + String(time.getMinutes()).padStart(2,'0') : '';
      return '<div class="comment-item"><span class="who">' + esc(c.user) + '</span>' + esc(c.text) + '<span class="when">' + timeStr + '</span></div>';
    }).join('');
  });
  document.querySelectorAll('[data-comment-count]').forEach(function(el) {
    var id = el.dataset.commentCount;
    var count = (allComments[id] || []).length;
    el.textContent = count > 0 ? count : '';
  });
}

function applyDayCommentsUI() {
  document.querySelectorAll('[data-day-comments]').forEach(function(el) {
    var day = el.dataset.dayComments;
    var items = allDayComments[day] || [];
    el.innerHTML = items.map(function(c) {
      var time = c.ts ? new Date(c.ts.seconds * 1000) : null;
      var timeStr = time ? String(time.getHours()).padStart(2,'0') + ':' + String(time.getMinutes()).padStart(2,'0') : '';
      return '<div class="comment-item"><span class="who">' + esc(c.user) + '</span>' + esc(c.text) + '<span class="when">' + timeStr + '</span></div>';
    }).join('');
  });
}

tripRef.collection('comments').orderBy('ts', 'asc').onSnapshot(function(snap) {
  allComments = {};
  snap.forEach(function(doc) {
    var d = doc.data();
    if (!allComments[d.eventId]) allComments[d.eventId] = [];
    allComments[d.eventId].push(d);
  });
  applyCommentsUI();
});

tripRef.collection('dayComments').orderBy('ts', 'asc').onSnapshot(function(snap) {
  allDayComments = {};
  snap.forEach(function(doc) {
    var d = doc.data();
    if (!allDayComments[d.day]) allDayComments[d.day] = [];
    allDayComments[d.day].push(d);
  });
  applyDayCommentsUI();
});

// --- Notes view ---
function renderNotes() {
  var html = '';
  var hasData = false;

  [1, 2].forEach(function(day) {
    var dayKey = 'day' + day;
    var dayLabel = 'Day 0' + day;
    var dayEvents = eventsData.filter(function(e) { return e.day === day; });
    dayEvents.sort(function(a, b) { return a.start < b.start ? -1 : 1; });

    var dayHtml = '';
    dayEvents.forEach(function(evt) {
      var scoreData = allScores[evt.id] || {};
      var total = (scoreData.H || 0) + (scoreData.A || 0);
      var comments = allComments[evt.id] || [];

      if (total !== 0 || comments.length > 0) {
        hasData = true;
        var scoreClass = total > 0 ? ' positive' : total < 0 ? ' negative' : '';
        dayHtml += '<div class="note-card"><div class="nc-header"><span class="nc-place">' + esc(evt.activity) + '</span>';
        if (total !== 0) dayHtml += '<span class="nc-score' + scoreClass + '">' + (total > 0 ? '+' : '') + total + '</span>';
        dayHtml += '</div>';
        if (comments.length) {
          dayHtml += '<div class="nc-comments">';
          comments.forEach(function(c) { dayHtml += '<span><b>' + esc(c.user) + '</b> ' + esc(c.text) + '</span>'; });
          dayHtml += '</div>';
        }
        dayHtml += '</div>';
      }
    });

    var dayC = allDayComments[dayKey] || [];
    if (dayC.length) {
      hasData = true;
      dayHtml += '<div class="note-card" style="border-left-color:#2563eb"><div class="nc-header"><span class="nc-place">' + dayLabel + ' 총평</span></div><div class="nc-comments">';
      dayC.forEach(function(c) { dayHtml += '<span><b>' + esc(c.user) + '</b> ' + esc(c.text) + '</span>'; });
      dayHtml += '</div></div>';
    }

    if (dayHtml) html += '<div class="notes-section"><h3>' + dayLabel + '</h3>' + dayHtml + '</div>';
  });

  document.getElementById('notesContent').innerHTML = hasData ? html : '<div class="notes-empty">아직 기록이 없어요</div>';
}

function exportNotes() {
  var lines = [];
  [1, 2].forEach(function(day) {
    var dayKey = 'day' + day;
    lines.push('## Day 0' + day);
    var dayEvents = eventsData.filter(function(e) { return e.day === day; });
    dayEvents.sort(function(a, b) { return a.start < b.start ? -1 : 1; });

    dayEvents.forEach(function(evt) {
      var scoreData = allScores[evt.id] || {};
      var total = (scoreData.H || 0) + (scoreData.A || 0);
      var comments = allComments[evt.id] || [];
      if (total !== 0 || comments.length > 0) {
        var scoreTxt = total !== 0 ? ' [' + (total > 0 ? '+' : '') + total + ']' : '';
        lines.push('- ' + evt.activity + scoreTxt);
        comments.forEach(function(c) { lines.push('  - ' + c.user + ': ' + c.text); });
      }
    });
    var dayC = allDayComments[dayKey] || [];
    if (dayC.length) {
      lines.push('- 총평');
      dayC.forEach(function(c) { lines.push('  - ' + c.user + ': ' + c.text); });
    }
    lines.push('');
  });
  navigator.clipboard.writeText(lines.join('\n')).then(function() { alert('복사 완료! 노션에 붙여넣기 하세요.'); });
}

  }).addTo(map);

  function makeIcon(color, size) {

    });
  }

  var accent = '#e85a1a', day2color = '#2563eb';

  var day1Places = [
    { name: '제주공항', lat: 33.5104, lng: 126.4914, fixed: true },
    { name: '라마다 시티홀', lat: 33.4997, lng: 126.5313, fixed: true },
    { name: '산지천', lat: 33.5137, lng: 126.5270, fixed: false },
    { name: '디앤디파트먼트/탑동', lat: 33.5170, lng: 126.5250, fixed: false },
    { name: '와인창고', lat: 33.4920, lng: 126.5280, fixed: false },
    { name: '갓포제호', lat: 33.4970, lng: 126.5400, fixed: true }
  ];

  var day2Places = [
    { name: '라마다 (출발)', lat: 33.4997, lng: 126.5313, fixed: true },
    { name: '용두암 러닝', lat: 33.5163, lng: 126.5119, fixed: true },
    { name: '가스안전공사', lat: 33.4530, lng: 126.5700, fixed: true },
    { name: '일통이반', lat: 33.4870, lng: 126.5320, fixed: true },
    { name: '커피템플 (합류)', lat: 33.4850, lng: 126.5650, fixed: true },
    { name: '와인창고', lat: 33.4920, lng: 126.5280, fixed: false },
    { name: '내도바당횟집', lat: 33.5060, lng: 126.4550, fixed: true },
    { name: '제주공항', lat: 33.5104, lng: 126.4914, fixed: true }
  ];

  var day1Layer = L.layerGroup(), day2Layer = L.layerGroup();

  function addMarkers(places, layer, color) {
    var coords = [];
    places.forEach(function(p) {
      var size = p.fixed ? 18 : 12;
      var marker = L.marker([p.lat, p.lng], { icon: makeIcon(color, size) });
      marker.bindTooltip(p.name, { permanent: true, direction: 'top', offset: [0, -size/2 - 2], className: 'map-tooltip' });
      marker.addTo(layer);
      coords.push([p.lat, p.lng]);
    });
    L.polyline(coords, { color: color, weight: 3, opacity: 0.7, dashArray: '8 6' }).addTo(layer);
  }

  addMarkers(day1Places, day1Layer, accent);
  addMarkers(day2Places, day2Layer, day2color);
  day1Layer.addTo(map);

  window.showDay = function(day) {
    document.querySelectorAll('.map-tab').forEach(function(t, i) { t.classList.toggle('active', i === day - 1); });

    else { map.removeLayer(day1Layer); day2Layer.addTo(map); map.fitBounds(day2Places.map(function(p) { return [p.lat, p.lng]; }), { padding: [30, 30] }); }
  };
  map.fitBounds(day1Places.map(function(p) { return [p.lat, p.lng]; }), { padding: [30, 30] });
})();

// --- Timeline ---
function updateTimeline() {
  var events = document.querySelectorAll('.event[data-start]');
  var nowPill = document.getElementById('nowPill');
  var now = new Date();
  var activeFound = false;
  var sorted = Array.from(events).map(function(el) { return { el: el, start: new Date(el.dataset.start) }; }).sort(function(a, b) { return a.start - b.start; });
  sorted.forEach(function(evt, idx) {
    evt.el.classList.remove('now', 'past');
    var next = sorted[idx + 1];
    var end = next ? next.start : new Date(evt.start.getTime() + 90 * 60 * 1000);
    if (now >= end) { evt.el.classList.add('past'); }
    else if (now >= evt.start) { evt.el.classList.add('now'); activeFound = true; }
  });
  nowPill.classList.toggle('active', activeFound);
}

(function() {
  var clock = document.getElementById('clock');
  function tick() {
    var now = new Date();
    var hh = String(now.getHours()).padStart(2, '0');
    var mm = String(now.getMinutes()).padStart(2, '0');
    var dd = String(now.getDate()).padStart(2, '0');
    var mo = String(now.getMonth() + 1).padStart(2, '0');
    clock.textContent = mo + '/' + dd + '  ' + hh + ':' + mm;
    updateTimeline();
  }
  tick();
  setInterval(tick, 30000);
  setTimeout(function() { var e = document.querySelector('.event.now'); if (e) e.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 800);
})();
</script>
