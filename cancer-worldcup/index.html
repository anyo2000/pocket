  body{font-family:'A2Z',"Apple SD Gothic Neo","맑은 고딕",sans-serif;
    background:radial-gradient(135% 95% at 50% -8%,#FDFAF4,#EEE3D1);color:var(--ink);-webkit-font-smoothing:antialiased;
    position:fixed;inset:0;overflow:hidden}
  /* 고정 캔버스 + 통째 스케일: 비율·글씨 절대 안 변함 */
  #stage{position:absolute;left:50%;top:50%;transform-origin:center center;display:flex;flex-direction:column}
  body.port #stage{width:440px;height:880px;padding:10px 12px}
  body.land #stage{width:1100px;height:660px;padding:16px 22px}

  .screen{display:none;flex:1;flex-direction:column;min-height:0;overflow-y:auto}
  #match{overflow:hidden}
  .screen.on{display:flex;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(.96)}100%{transform:scale(1)}}
  @keyframes slideD{from{transform:translateY(-30px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes slideU{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

  .btn{cursor:pointer;border:none;font-family:inherit;font-weight:800;border-radius:14px;transition:.12s}
  .btn-cta{background:var(--maroon);color:#fff;font-size:20px;padding:17px;box-shadow:0 8px 20px rgba(162,59,45,.32);width:100%}
  .btn-cta:active{transform:scale(.97)}
  .btn-ghost{background:#fff;color:var(--navy);font-size:16px;padding:14px;border:1.5px solid var(--line);width:100%}

  /* 인트로 */
  #intro{justify-content:center;align-items:center;text-align:center;gap:14px}
  .emoji{font-size:56px}
  #intro h1{font-size:34px;font-weight:800;letter-spacing:-.5px;color:var(--maroon)}
  #intro .sub{color:#6b6457;font-size:16px;line-height:1.6}
  #intro .start-wrap{width:100%;max-width:380px;margin-top:8px}
  #intro .basis{color:var(--gray);font-size:14.5px;margin-top:12px}
  .pick-label{font-size:14px;font-weight:700;color:var(--navy);margin-top:4px}
  .demo-pick{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px}
  .demo-pick button{font-family:inherit;font-weight:800;font-size:16px;padding:14px;border-radius:13px;
    border:1.5px solid var(--line);background:#fff;color:var(--navy);cursor:pointer;transition:.12s}
  .demo-pick button.sel{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 6px 16px rgba(44,60,92,.28)}
  .demo-pick button:active{transform:scale(.97)}

  /* 매치 상단 바 (진행 + 질문 + 보험료/나이) */
  .mhead{flex:0 0 auto;text-align:center;padding:2px 0 12px;border-bottom:1.5px solid #E8DFCD;margin-bottom:6px}
  .mtitlebar{display:flex;align-items:center;justify-content:center;gap:16px}
  .mtitle{font-weight:900;font-size:32px;color:var(--navy);letter-spacing:-1px}
  .hbadge{font-size:14px;font-weight:800;padding:7px 15px;border-radius:999px;white-space:nowrap;color:#fff;flex:0 0 auto}
  .hbadge.demo{background:linear-gradient(135deg,#34507F,#23344F);box-shadow:0 4px 12px rgba(44,60,92,.28)}
  .hbadge.round{background:var(--maroon);letter-spacing:1px}
  .dots{margin-top:10px;display:flex;gap:5px;justify-content:center}
  .dots i{width:16px;height:4px;border-radius:3px;background:#E0D6C5}
  .dots i.done{background:var(--maroon)} .dots i.cur{background:var(--navy)}
  /* 하단 컨트롤 */
  .mfoot{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:10px;padding-top:10px}
  .fee-all{background:var(--maroon);color:#fff;font-weight:800;font-size:16px;border:none;border-radius:999px;
    padding:13px 26px;cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:0 6px 16px rgba(162,59,45,.35)}
  .fee-all:active{transform:scale(.96)}
  .fee-all.done{background:#7a8aa8;cursor:default;box-shadow:none;font-size:15px}
  .fee-all.pulse{animation:btnpulse .45s}
  @keyframes btnpulse{0%,100%{transform:scale(1)}45%{transform:scale(1.1)}}
  .demo-chip{font-size:13px;font-weight:800;color:var(--navy);background:#fff;border:1.5px solid var(--line);
    border-radius:999px;padding:9px 14px;white-space:nowrap;box-shadow:0 3px 8px rgba(60,45,30,.1)}

  /* 매치 본문: 카드 2장(내용 높이) + 가운데 VS, 화면 중앙에 여백 두고 배치 */
  .arena{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:0}
  .arena > #slotA,.arena > #slotB{width:100%;flex:0 1 auto;min-height:0;display:flex}
  .card{width:100%;display:flex;flex-direction:column;gap:9px;background:#fff;border-radius:18px;cursor:pointer;
    padding:16px 16px;box-shadow:0 8px 22px rgba(60,45,30,.13);transition:transform .12s}
  .card:active{transform:scale(.99)}
  .card.sideA{animation:slideD .4s cubic-bezier(.2,.75,.3,1)}
  .card.sideB{animation:slideU .4s cubic-bezier(.2,.75,.3,1)}
  .card.flash{animation:pop .25s}
  /* 헤더: 아이콘 + 제목 한 줄 */
  .chead{display:flex;align-items:center;gap:12px}
  .cicon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .cicon svg{width:25px;height:25px}
  .card.sideA .cicon{background:#F7E7E3;color:var(--maroon)}
  .card.sideB .cicon{background:#E7EBF3;color:var(--navy)}
  .ctitle{min-width:0}
  .ctag{font-size:13.5px;font-weight:700}
  .cov{font-size:26px;font-weight:800;line-height:1.15;word-break:keep-all;margin-top:1px}
  .covsub{font-size:.56em;font-weight:800;letter-spacing:-.3px}
  .card.sideA .ctag,.card.sideA .cov{color:var(--maroon)}
  .card.sideB .ctag,.card.sideB .cov{color:var(--navy)}
  .cdesc{font-size:15px;color:#5a5346;line-height:1.4;word-break:keep-all}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
  .tag{font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px}
  .card.sideA .tag{background:#F5E3DF;color:var(--maroon)} .card.sideB .tag{background:#E5EAF2;color:var(--navy)}
  .enroll{font-size:13px;color:#857f70;line-height:1.4;word-break:keep-all}
  .enroll b{font-weight:800;margin-right:5px}
  .card.sideA .enroll b{color:var(--maroon)} .card.sideB .enroll b{color:var(--navy)}
  /* 보상 박스 (카드별 강조색) — 라벨(작은 회색)+큰금액 한 줄 + 세부 */
  .pay{border-radius:13px;padding:11px 14px;text-align:center}
  .card.sideA .pay{background:#FBEEEA} .card.sideB .pay{background:#EDF1F7}
  .pay-line{display:flex;align-items:baseline;justify-content:center;gap:7px;flex-wrap:wrap}
  .pay-label{font-size:13px;font-weight:700;color:var(--gray)}
  .pay-big{font-size:40px;font-weight:800;letter-spacing:-1px;line-height:1.05}
  .pay-big .won{font-size:.4em;font-weight:800;margin-left:2px}
  .card.sideA .pay-big{color:var(--maroon)} .card.sideB .pay-big{color:var(--navy)}
  .pay-detail{font-size:13px;color:#8a8170;margin-top:5px;line-height:1.4;word-break:keep-all}
  /* 보험료 박스 (누르면 등장, 카드별 강조색 채움) */
  .fee-open{visibility:hidden;margin-top:9px;border-radius:12px;padding:13px;text-align:center}
  .fee-open.show{visibility:visible;animation:fade .2s}
  .card.sideA .fee-open{background:var(--maroon)} .card.sideB .fee-open{background:var(--navy)}
  .fee-open .amt{font-size:27px;font-weight:800;color:#fff;letter-spacing:-.5px}
  .fee-open .wonm{font-size:.58em;font-weight:700;margin-right:5px;opacity:.85}
  /* 가운데 VS (원 없이 큰 그림자 글씨) */
  .vs{flex:0 0 auto;color:var(--navy);font-weight:900;font-style:italic;font-size:34px;letter-spacing:1px;
    text-shadow:0 4px 11px rgba(60,45,30,.3);margin:-4px 0;z-index:3}

  /* 가로(웹) = 좌·우 배치 / 세로(모바일) = 상·하 배치 (JS가 body.land/.port 토글) */
  body.land .arena{flex-direction:row;align-items:center;justify-content:center;gap:22px}
  body.land #slotA,body.land #slotB{width:480px;flex:0 0 auto}
  body.land .card{width:480px;height:430px;justify-content:center;padding:22px 20px;border-radius:22px}
  body.land .vs{margin:0}
  body.port .vs{margin:-6px 0}

  @keyframes burst{0%{transform:scale(1)}40%{transform:scale(1.45);color:var(--gold)}100%{transform:scale(1)}}
  .vs.burst{animation:burst .5s}

  /* 승부 연출 */
  .card.winner{position:relative;box-shadow:0 0 0 3px var(--gold),0 12px 30px rgba(217,154,43,.4);transform:scale(1.03);transition:.3s;z-index:3}
  .card.winner::after{content:'WIN';position:absolute;top:-13px;right:18px;background:var(--gold);color:#3a2a00;
    font-weight:900;font-size:14px;padding:5px 14px;border-radius:999px;box-shadow:0 3px 8px rgba(0,0,0,.25)}
  .card.loser{opacity:.4;filter:grayscale(.6);transform:scale(.92);transition:.3s}
  #banner{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:40;pointer-events:none}
  #banner.on{display:flex}
  #banner .toast{background:rgba(44,60,92,.97);padding:28px 40px;border-radius:22px;box-shadow:0 18px 46px rgba(0,0,0,.45);text-align:center;animation:popbig .4s;max-width:90vw}
  #banner .bn-name{font-size:34px;font-weight:900;color:#fff;word-break:break-all;line-height:1.25}
  #banner .bn-adv{margin-top:10px;font-size:30px;font-weight:900;color:var(--gold)}
  @keyframes popbig{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

  /* 엔딩 */
  .ehead{text-align:center;margin-bottom:16px}
  .ehead .crown{font-size:44px}
  .ehead h2{font-size:26px;font-weight:800;margin-top:2px;color:var(--navy)}
  .ehead p{color:#6b6457;font-size:14px;margin-top:5px}
  #ranks{display:flex;gap:14px;margin-bottom:14px}
  body.port #ranks{flex-direction:column;gap:11px}
  .rank{flex:1;background:#fff;border-radius:17px;padding:16px;display:flex;gap:13px;align-items:flex-start;box-shadow:0 8px 22px rgba(60,45,30,.13)}
  .rank.r1{outline:3px solid var(--gold)}
  .rank .medal{font-size:34px;flex:0 0 auto}
  .rank .rb{flex:1;min-width:0}
  .rank .rn{font-size:21px;font-weight:800;color:var(--navy);word-break:keep-all}
  .rank .rlabel{font-size:13px;font-weight:800;color:var(--maroon);margin-right:6px}
  .rank .rmerit{font-size:15.5px;color:#5a5346;margin-top:6px;line-height:1.45;word-break:keep-all}
  .rank .rc{margin-top:9px;display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-size:13px;background:var(--box);border-radius:9px;padding:6px 10px;color:#3a4654}
  .chip b{color:var(--navy)} .chip.pay b{color:var(--maroon)}
  .note-box{background:#fff;border-left:5px solid var(--maroon);border-radius:12px;padding:13px 15px;margin:4px 0 18px;font-size:13.5px;line-height:1.6;color:#5a5346}
  .note-box b{color:var(--maroon)}
  .eactions{display:flex;flex-direction:column;gap:10px;max-width:420px;margin:0 auto;width:100%}

  /* 부록 */
  .ahead{text-align:center;margin-bottom:13px}
  .ahead h2{font-size:23px;font-weight:800;color:var(--navy)}
  .ahead p{color:#6b6457;font-size:13px;margin-top:4px}
  .acard{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 6px 16px rgba(60,45,30,.1)}
  .acard .atag{font-size:13px;font-weight:700;color:var(--maroon)}
  .acard .an{font-size:18px;font-weight:800;color:var(--navy);margin-top:1px}
  .acard .arows{margin-top:9px;display:grid;gap:6px;font-size:14px;color:#3a4654}
  .acard .arows span b{color:var(--gray);font-weight:700;margin-right:8px}
  .acard .arows .pay2{color:var(--maroon);font-weight:700}
  .foot{color:var(--gray);font-size:11.5px;text-align:center;margin-top:13px;line-height:1.6}
</style>
</head>
<body>
<div id="stage">

  <!-- 인트로 -->
  <section id="intro" class="screen on">
    <div class="emoji">🎗️🏆</div>
    <h1>암보장 챔피언십</h1>
    <p class="sub">끌리는 보장을 누르면 끝.<br>내 1순위 암보장을 찾아드려요.</p>
    <div class="pick-label">나이·성별 선택</div>
    <div class="demo-pick" id="demoPick">
      <button data-d="30남" onclick="setDemo('30남')">30대 남</button>
      <button data-d="30여" onclick="setDemo('30여')">30대 여</button>
      <button data-d="50남" onclick="setDemo('50남')">50대 남</button>
      <button data-d="50여" onclick="setDemo('50여')">50대 여</button>
    </div>
    <div class="start-wrap"><button class="btn btn-cta" onclick="start()">시작하기</button></div>
    <p class="basis">보험료 : 한아름 2604 가입금액 1천만 기준</p>
  </section>

  <!-- 매치 -->
  <section id="match" class="screen">
    <div class="mhead">
      <div class="mtitlebar">
        <span class="hbadge demo" id="demoBadge"></span>
        <span class="mtitle">암보장 챔피언십</span>
        <span class="hbadge round" id="round">8강</span>
      </div>
      <div class="dots" id="dots"></div>
    </div>
    <div class="arena">
      <div id="slotA"></div>
      <div class="vs">VS</div>
      <div id="slotB"></div>
    </div>
    <div class="mfoot">
      <button class="fee-all" id="feeAllBtn" onclick="reveal()">💰 보험료 비교하기</button>
    </div>
  </section>

  <!-- 엔딩 -->
  <section id="ending" class="screen">
    <div class="ehead">
      <div class="crown">👑</div>
      <h2>내가 고른 최고의 암보장</h2>
      <p>토너먼트 결과예요</p>
    </div>
    <div id="ranks"></div>
    <div class="eactions">
      <button class="btn btn-cta" onclick="restart()">다시하기</button>
    </div>
  </section>

  <!-- 부록 -->
  <section id="appendix" class="screen">
    <div class="ahead"><h2>8개 담보 전체</h2><p>한줄 · 가입 · 보상예시 · 보험료</p></div>
    <div id="aList"></div>
    <div style="margin-top:6px;max-width:420px;margin:6px auto 0;width:100%"><button class="btn btn-ghost" onclick="show(lastScreen)">돌아가기</button></div>
    <p class="foot">⚠ 표시 = 본사 보험료 미수령 / 약관 확인 필요 · 통합암·일부 캡 표기는 정리본 기준</p>
  </section>

</div>

<div id="banner"><div class="toast"><div class="bn-name"></div><div class="bn-adv"></div></div></div>

    desc:'병원 제한 없이 복합치료를 저렴하게',
    enroll:'암특정치료생활비 1천 (병원 무관)',
    benefit:'<span class="seg-g">1회 X</span> → 2회 1천 → 3회 1.5천 → <span class="seg-g">4회 1.5천</span>',
    fee:'13,810원'},
  rad:{name:'항암방사선약물치료비(연간1회한,급여)', tag:'급여 방사선·약물 집중보장',
    desc:'급여 항암 방사선 또는 급여 약물 치료시 보장',
    enroll:'항암방사선약물치료비 1천', benefit:'항암 방사선 치료시 1천 (추가 약물치료시 보장 X)',
    feeUnknown:true},
};

/* ===== 보험료 (4종 · 가입제안서 2026-06-22 · 단위 원 · 1천만 기준) ===== */
const DEMO={'30남':'30대 남','30여':'30대 여','50남':'50대 남','50여':'50대 여'};
let demo='30남';
const FEE={
  diag:{'30남':'12,800','30여':'10,600','50남':'23,620','50여':'15,070'},
  dx:  {'30남':'14,855','30여':'13,184','50남':'27,474','50여':'17,862'},
  surg:{'30남':'15,700','30여':'11,500','50남':'28,400','50여':'14,800'},
  spec:{'30남':'29,350','30여':'25,075','50남':'53,955','50여':'32,895'},
  targ:{'30남':'20,500','30여':'20,300','50남':'36,500','50여':'30,200'},
  acc: {'30남':'12,840','30여':'14,570','50남':'23,220','50여':'17,860'},
  spcl:{'30남':'6,210','30여':'7,230','50남':'11,520','50여':'8,370'},
  rad: {'30남':'57,160','30여':'39,760','50남':'108,780','50여':'58,980'},
};
function setDemo(d){demo=d;document.querySelectorAll('#demoPick button').forEach(b=>b.classList.toggle('sel',b.dataset.d===d));}

/* ===== 보상예시 (구조화 — 값은 검증본 그대로, 표현만 개선) ===== */
const PAY={
  diag:{label:'암 진단 시',   big:'1,000', detail:'진단 시 1회 정액'},
  dx:  {label:'최대',        big:'6,000', detail:'진단 1,000만 · 표적 +2,000만 · 양성자 +3,000만'},
  surg:{label:'암 수술 시',   big:'1,000', detail:'수술 받을 때마다 정액'},
  spec:{label:'연 최고',     big:'4,500', detail:'1종 1,000만 · 2종 2,000만 · 3종 3,000만'},
  targ:{label:'표적치료 시',  big:'1,000', detail:'연 1회 정액'},
  acc: {label:'최대',        big:'3,000', detail:'1회 1,000만 · 2회 2,000만 · 3회 2,500만 · 4회 3,000만'},
  spcl:{label:'최대',        big:'1,500', detail:'1회 없음 · 2회 1,000만 · 3·4회 1,500만'},
  rad: {label:'방사선 치료 시',big:'1,000', detail:'추가 약물치료는 보장 X'},
};
function fmtName(n){return n.replace(/(\([^)]*\))/,'<span class="covsub">$1</span>');}
function renderPay(id){
  const p=PAY[id];
  return `<div class="pay">
    <div class="pay-line"><span class="pay-label">${p.label}</span><span class="pay-big">${p.big}<span class="won">만원</span></span></div>
    <div class="pay-detail">${p.detail}</div>
  </div>`;
}

/* ===== 장점 한 줄 (엔딩용) ===== */
const MERIT={
  diag:'진단 시 목돈을 한 번에 받는 가장 기본 보장',
  dx:'진단금에 양성자·표적 비급여 치료까지 한 담보로',
  surg:'암 수술 비용을 정액으로 직접 보장',
  spec:'5가지 주요 치료를 종합병원에서 폭넓게',
  targ:'고가 비급여 표적항암 치료비를 정액 보장',
  acc:'치료가 반복될수록 누적해 최고 300%',
  spcl:'병원 제한 없이 복합치료를 저렴하게 보강',
  rad:'급여 항암 방사선·약물 치료비를 정액 보장',
};

/* ===== 카테고리 태그 (담보가 다루는 치료/구성) ===== */
const TAGS={
  diag:['진단'],
  dx:['진단','비급여표적','비급여양성자'],
  surg:['수술'],
  spec:['수술','방사선','약물','중환자','호스피스'],
  targ:['비급여표적'],
  acc:['수술','방사선','약물','중환자'],
  spcl:['수술','방사선','약물','중환자'],
  rad:['급여방사선','급여약물'],
};

/* ===== 브래킷 (7경기, 1·2위만) ===== */
const SCHED=[
  {key:'r1_0',round:'8강',sub:'더 끌리는 보장은?',a:'diag',b:'dx'},
  {key:'r1_1',round:'8강',sub:'더 끌리는 보장은?',a:'surg',b:'spec'},
  {key:'r1_2',round:'8강',sub:'더 끌리는 보장은?',a:'targ',b:'acc'},
  {key:'r1_3',round:'8강',sub:'더 끌리는 보장은?',a:'spcl',b:'rad'},
  {key:'semi_0',round:'4강',sub:'더 중요한 보장은?'},
  {key:'semi_1',round:'4강',sub:'더 중요한 보장은?'},
  {key:'final',round:'결승',sub:'내 1순위 암보장은?'},
];
let cursor=0; const res={}; let lastScreen='ending';
function resolve(m){
  if(m.key==='semi_0'){m.a=res.r1_0.winner;m.b=res.r1_1.winner;}
  else if(m.key==='semi_1'){m.a=res.r1_2.winner;m.b=res.r1_3.winner;}
  else if(m.key==='final'){m.a=res.semi_0.winner;m.b=res.semi_1.winner;}
  return m;
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  if(id!=='appendix') lastScreen=id;
  window.scrollTo(0,0);
}
function start(){cursor=0;for(const k in res)delete res[k];renderMatch();show('match');}
function restart(){start();}

function cardHTML(id,side){
  const c=C[id];
  return `<div class="card side${side}" id="card_${side}" onclick="pick('${side}')">
    <div class="chead">
      <div class="cicon">${ICON[id]}</div>
      <div class="ctitle"><div class="ctag">${c.tag}</div><div class="cov">${fmtName(c.name)}</div></div>
    </div>
    <div class="cdesc">${c.desc}</div>
    <div class="tags">${TAGS[id].map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="enroll"><b>가입</b>${c.enroll}</div>
    ${renderPay(id)}
    <div class="fee-open" id="fee_${side}">
      <div class="amt"><span class="wonm">월</span>${FEE[id][demo]}원</div>
    </div>
  </div>`;
}
function reveal(){
  if(revealed)return;
  revealed=true;
  document.getElementById('fee_A').classList.add('show');
  document.getElementById('fee_B').classList.add('show');
  const btn=document.getElementById('feeAllBtn');
  if(btn){btn.textContent='👆 더 가치있어 보이는 보장 선택';btn.classList.add('done');}
}
function flashBtn(){
  const b=document.getElementById('feeAllBtn'); if(!b)return;
  b.classList.remove('pulse'); void b.offsetWidth; b.classList.add('pulse');
}

function renderMatch(){
  const m=resolve(SCHED[cursor]);
  document.getElementById('round').textContent=m.round;
  document.getElementById('demoBadge').textContent='👤 '+DEMO[demo]+'자';
  let d='';for(let i=0;i<SCHED.length;i++)d+=`<i class="${i<cursor?'done':(i===cursor?'cur':'')}"></i>`;
  document.getElementById('dots').innerHTML=d;
  document.getElementById('slotA').innerHTML=cardHTML(m.a,'A');
  document.getElementById('slotB').innerHTML=cardHTML(m.b,'B');
  revealed=false;
  const fb=document.getElementById('feeAllBtn'); if(fb){fb.textContent='💰 보험료 비교하기';fb.classList.remove('done');}
}
let busy=false, revealed=false;
function pick(side){
  if(busy)return;
  if(!revealed){ flashBtn(); return; }   // 보험료 본 뒤에만 선택 가능
  busy=true;
  const m=SCHED[cursor];
  const win=side==='A'?m.a:m.b, lose=side==='A'?m.b:m.a;
  res[m.key]={winner:win,loser:lose};
  const winCard=document.getElementById('card_'+side);
  const loseCard=document.getElementById('card_'+(side==='A'?'B':'A'));
  if(winCard)winCard.classList.add('winner');
  if(loseCard)loseCard.classList.add('loser');
  const vs=document.querySelector('.vs'); if(vs)vs.classList.add('burst');
  if(navigator.vibrate)navigator.vibrate(60);
  const adv = m.key.startsWith('r1')?'4강 진출!':(m.key.startsWith('semi')?'결승 진출!':'🏆 우승!');
  const banner=document.getElementById('banner');
  banner.querySelector('.bn-name').textContent=C[win].name;
  banner.querySelector('.bn-adv').textContent=adv;
  banner.classList.add('on');
  setTimeout(()=>{
    banner.classList.remove('on'); if(vs)vs.classList.remove('burst');
    busy=false;cursor++;
    if(cursor>=SCHED.length){renderEnding();show('ending');}else renderMatch();
  },1900);
}

function rankHTML(id,place){
  const c=C[id];
  const medal=place===1?'🥇':'🥈';
  const label=place===1?'우승':'준우승';
  return `<div class="rank r${place}"><div class="medal">${medal}</div><div class="rb">
    <div class="rn"><span class="rlabel">${label}</span>${c.name}</div>
    <div class="rmerit">${MERIT[id]}</div>
    <div class="rc">
      <span class="chip pay">💰 <b>월 ${FEE[id][demo]}원</b></span>
    </div></div></div>`;
}
function renderEnding(){
  document.getElementById('ranks').innerHTML=
    rankHTML(res.final.winner,1)+rankHTML(res.final.loser,2);
}

function buildAppendix(){
  const ids=['diag','dx','surg','spec','targ','acc','spcl','rad'];
  let h='';
  for(const id of ids){const c=C[id];
    h+=`<div class="acard"><div class="atag">${c.tag}</div><div class="an">${c.name}</div><div class="arows">
      <span><b>한줄</b>${c.desc}</span>
      <span><b>가입</b>${c.enroll}</span>
      <span><b>보상예시</b>${c.benefit}</span>
      <span class="pay2"><b>보험료</b>30남 ${FEE[id]['30남']} · 30여 ${FEE[id]['30여']} · 50남 ${FEE[id]['50남']} · 50여 ${FEE[id]['50여']}</span>
    </div></div>`;
  }
  document.getElementById('aList').innerHTML=h;
}
buildAppendix();
setDemo(demo);

/* ===== 고정 캔버스 자동 스케일 ===== */
function fitStage(){
  const vw=window.innerWidth, vh=window.innerHeight;
  const land = vw/vh > 1.15;
  document.body.classList.toggle('land',land);
  document.body.classList.toggle('port',!land);
  const W=land?1100:440, H=land?660:880, pad=land?28:10;
  const s=Math.min((vw-pad)/W,(vh-pad)/H);
  const st=document.getElementById('stage');
  st.style.transform=`translate(-50%,-50%) scale(${s})`;
}
window.addEventListener('resize',fitStage);
window.addEventListener('orientationchange',fitStage);
fitStage();
</script>
</body>
</html>
